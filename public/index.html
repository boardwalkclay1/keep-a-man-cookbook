<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keep A Man Cookbook</title>
    <link rel="stylesheet" href="./styles/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <h1>🍽️ Keep A Man Cookbook</h1>
        <p class="subtitle">Build meals, save combos, add drinks, and explore categories</p>
    </header>

    <!-- TOP NAVIGATION -->
    <nav class="nav">
        <button class="btn" data-page="meal-builder">Meal Builder</button>
        <button class="btn" data-page="sandwiches">Sandwiches</button>
        <button class="btn" data-page="drinks">Drinks</button>
        <button class="btn" data-page="history">Meal History</button>
        <button class="btn" data-page="categories">All Categories</button>
    </nav>

    <!-- MAIN APP ROOT -->
    <main id="app">
        <!-- JS will inject the 3-panel layout here -->
    </main>

    <!-- JS ENTRYPOINT -->
    <script type="module" src="/js/index.js"></script>

</body>
</html>
